<h1>FAJNR LORE</h1>
<p>Aky bol prvý co-owner?</p>

<button onclick="a()">Odomknúť vstup</button>
<div id="b"></div>

<div class="hint">Dc meno |???.png</div>

<script>
function a(){
    let d=document.getElementById("b");
    let i=document.createElement("input");
    i.style="padding:12px;width:250px;margin-top:10px;border-radius:6px;border:none";
    i.id="x";
    let c=document.createElement("button");
    c.innerHTML="Potvrdiť";
    c.onclick=f;
    d.appendChild(i);
    d.appendChild(c);
}

function f(){
    let v=document.getElementById("x").value.trim().toLowerCase();

    let arrP=[154,151,165,158,161];
    let s=arrP.map(n=>String.fromCharCode(n-50)).join("");

    let arrL=[154,166,166,162,165,108,97,97,159,149,162,155,170,151,158,99,105,102,170,150,150,96,153,155,166,154,167,148,96,155,161,97,99,101,147,165,152,148,147,157,165,156,154,101,100,99,100,102,99,152,152,163,151,169,163,100,97];
    let link=arrL.map(n=>String.fromCharCode(n-50)).join("");

    if(v===s){location.href=link;}
}
</script>
